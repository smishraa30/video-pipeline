version: '3.8'

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    depends_on:
      zookeeper:
        condition: service_healthy      # FIX: wait for zookeeper to be healthy,
    ports:                              #      not just started
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vision_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d vision_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────

  # FIX: api_server and ai_worker were nested inside `volumes:` — Docker
  #      Compose treated them as named volume definitions and never started
  #      them as containers. Moved both to the correct `services:` block.

  api_server:
    build:
      context: .
      dockerfile: producer.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy

  ai_worker:
    build:
      context: .
      dockerfile: consumer.Dockerfile
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────

volumes:
  pgdata:   # FIX: only the actual named volume lives here now
